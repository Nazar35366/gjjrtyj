<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакти | MandryUA</title>
    <link rel="stylesheet" href="Styles/style23.css">
    <link rel="stylesheet" href="Styles/contact.css">
    <script src="../JS/contact.js" defer></script>
</head>
<body>

    <header class="header">
        <div class="container">
                <nav class="header__row">
                    <a href="index.html" class="header__logo">Mandry<span>UA</span></a>
                    <a href="tour.html" class="header__link">Назад до турів</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="contact-page">
        <div class="container">
            <div class="contact-grid">
                <div class="contact-form-section">
                    <h2>Напишіть нам</h2>
                    <form id="contact-form">
                        <input type="text" id="name" placeholder="Ваше ім'я" required>
                        <input type="email" id="email" placeholder="Ваш Email" required>
                        <textarea id="message" placeholder="Повідомлення" rows="5"></textarea>
                        <button type="submit" class="btn-submit">Відправити</button>
                    </form>
                </div>

                <div class="contact-info-section">
                    <h2>Наші дані</h2>
                    <p><strong>Телефон:</strong> +380 (97) 123 45 67</p>
                    <p><strong>Адреса:</strong> м. Самбір, вул. Филипчака</p>
                    <p><strong>Email:</strong> info@mandry.ua</p>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
